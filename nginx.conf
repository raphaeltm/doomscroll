server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # GDELT API proxy (mirrors the Vite dev proxy)
    location /api/gdelt/ {
        proxy_pass https://api.gdeltproject.org/api/v2/doc/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gdeltproject.org;
        proxy_set_header Accept-Encoding "";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
