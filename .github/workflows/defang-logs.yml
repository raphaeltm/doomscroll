name: Defang Logs
on:
  workflow_dispatch:
    inputs:
      lines:
        description: Number of log lines to fetch
        default: "100"
      since:
        description: "Show logs since (e.g. 1h, 30m)"
        default: ""
      service:
        description: "Service name (leave blank for all)"
        default: ""
      stack:
        description: Stack
        default: production
jobs:
  logs:
    name: Defang logs (${{ inputs.stack }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/178019932583/locations/global/workloadIdentityPools/defang-github/providers/github-actions-1cjg1s
      - name: Fetch logs
        uses: DefangLabs/defang-github-action@v1
        with:
          command: logs --limit ${{ inputs.lines }} ${{ inputs.since && format('--since {0}', inputs.since) }} ${{ inputs.service }}
          project: doomscroll
          stack: ${{ inputs.stack }}
          compose-file: docker-compose.yml
    environment: defang-production
